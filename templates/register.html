<!DOCTYPE html>
<html lang="en">

<head>
  <title></title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      background-color: #212121;
      color: #FAFAFA;
      margin:0;
      padding:0;
    }
    body {
      height: 100vh;
      width: 100vw;
    }
    h1 {
      color: #1565C0;
    }
    .container {
      height:100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    input {
      border: 1px solid #424242;
      border-radius: 5px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    label {
      display: block;
      padding: 5px;
    }
    input:hover{
      border: 1px solid #1565C0;
    }
    .card {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      margin: 5px;
      padding: 1.5rem;
      color: inherit;
      text-decoration: none;
      border: 1px solid #424242;
      border-radius: 10px;
      width: 400px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Registration Form</h1>
    <div class="card">
      <form>
        <label>Name: <input type="text"></label>
        <label>new password: <input type="password" autocomplete="new-password"></label>
        <label>retype password: <input type="password" autocomplete="new-password"></label>
        <label><input type="submit"></label>
      </form>
    </div>
  </div>
</body>

</html>
